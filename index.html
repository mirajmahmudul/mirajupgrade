<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MIRAJ • Md Mahmudul Hasan — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       ORIGINAL COMIC THEME STYLES
    ═══════════════════════════════════════════ */
    :root {
      --yellow: #FFE000; --red: #FF2D2D; --blue: #0057FF; --ink: #0D0D0D;
      --white: #FFFDF0; --cream: #FFF9D6; --green: #00C853;
      --border-thick: 5px solid var(--ink);
      --shadow-big: 6px 6px 0px var(--ink);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--ink); overflow-x: hidden; }

    /* Nav & Hero Styles */
    nav { position: sticky; top: 0; z-index: 100; background: var(--yellow); border-bottom: var(--border-thick); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 66px; box-shadow: 0 5px 0 var(--ink); }
    .nav-logo { font-family: 'Bangers', cursive; font-size: 2.2rem; color: var(--ink); text-decoration: none; }
    .hero { display: grid; grid-template-columns: 1fr 380px; min-height: 88vh; border-bottom: var(--border-thick); }
    .hero-left { background: var(--white); border-right: var(--border-thick); padding: 50px 52px; display: flex; flex-direction: column; justify-content: center; }
    .hero-title { font-family: 'Bangers', cursive; font-size: clamp(3.5rem, 7vw, 6.5rem); line-height: 0.93; }
    .hero-right { background: var(--yellow); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; position: relative; }

    /* Section & Common Styles */
    .section { padding: 60px 52px; border-bottom: var(--border-thick); }
    .section-title { font-family: 'Bangers', cursive; font-size: 3rem; margin-bottom: 40px; display: flex; align-items: center; gap: 16px; }
    .num-badge { background: var(--yellow); border: 3px solid var(--ink); border-radius: 50%; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 3px 3px 0 var(--ink); }
    .btn { font-family: 'Bangers', cursive; font-size: 1.3rem; padding: 12px 28px; border: var(--border-thick); border-radius: 10px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; box-shadow: 5px 5px 0 var(--ink); transition: 0.1s; }
    .btn:hover { transform: translate(-3px,-3px); box-shadow: 8px 8px 0 var(--ink); }

    /* ═══════════════════════════════════════════
       CAT AI BOT STYLES (THE FIX)
    ═══════════════════════════════════════════ */
    .vr-robot { position: fixed; bottom: 110px; right: 28px; z-index: 1000; background: white; border: 3px solid var(--ink); border-radius: 50%; width: 70px; height: 70px; cursor: pointer; box-shadow: 4px 4px 0px var(--ink); display: flex; align-items: center; justify-content: center; }
    .vr-badge { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--ink); font-weight: 900; }
    .vr-pop { position: fixed; bottom: 190px; right: 28px; background: white; border: 3px solid var(--ink); padding: 15px; border-radius: 15px; z-index: 1000; box-shadow: 6px 6px 0px var(--ink); display: none; }
    .vr-pop.is-show { display: block; }
    .vr-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .vr-panel.is-open { display: flex; }
    .vr-panel-card { background: white; border: 4px solid var(--ink); width: 380px; max-width: 90vw; border-radius: 20px; padding: 20px; box-shadow: 10px 10px 0px var(--ink); }
    .vr-log { height: 250px; overflow-y: auto; border: 2px solid var(--ink); margin: 10px 0; padding: 10px; background: var(--cream); display: flex; flex-direction: column; gap: 10px; }
    .vr-bubble { background: white; border: 2px solid var(--ink); padding: 8px 12px; border-radius: 12px; font-size: 14px; max-width: 85%; }
    .vr-bubble.me { background: var(--blue); color: white; align-self: flex-end; }
    .vr-text-row { display: flex; gap: 8px; margin-top: 10px; }
    .vr-text-in { flex: 1; border: 2px solid var(--ink); padding: 10px; border-radius: 10px; outline: none; }
    
    /* Animation classes */
    .reveal { opacity: 0; transform: translateY(20px); transition: 0.5s; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) { .hero { grid-template-columns: 1fr; } .hero-right { display: none; } }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#hero">MIRAJ</a>
  <a class="btn" style="background:var(--red); color:white;" href="#contact">⚡ Let's Talk</a>
</nav>

<section class="hero" id="hero">
  <div class="hero-left">
    <h1 class="hero-title">MD MAHMUDUL<br/><span style="color:var(--red);">HASAN MIRAJ</span></h1>
    <p style="font-size: 1.2rem; margin: 20px 0; font-weight: 700;">AI Developer & Automation Specialist at BUFS, Busan.</p>
    <div style="display:flex; gap:10px; margin-bottom:30px;">
      <a class="btn" style="background:var(--red); color:white;" href="#contact">Hire Me</a>
      <a class="btn" style="background:var(--yellow);" href="#projects">Projects</a>
    </div>
  </div>
  <aside class="hero-right">
    <div style="width:250px; height:300px; border:var(--border-thick); background:white; box-shadow:var(--shadow-big);">
       <img src="profile-hero.png" alt="Miraj" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://via.placeholder.com/250x300?text=MIRAJ'">
    </div>
  </aside>
</section>

<section class="section" id="projects" style="background:var(--red);">
  <div class="section-title" style="color:white;"><div class="num-badge">01</div>PROJECTS UNLOCKED</div>
  <p style="color:white; font-weight:700;">Showing 2+ years of AI & Web experience.</p>
</section>

<footer style="background:var(--ink); color:white; padding:40px; text-align:center; font-family:'Bangers';">
  MIRAJ — MD MAHMUDUL HASAN | BUFS BUSAN | © 2026
</footer>

<button class="vr-robot" id="vrRobot">
  <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
    <ellipse cx="24" cy="27" rx="18" ry="17" fill="#FFB4D2" stroke="black" stroke-width="2"/>
    <ellipse cx="17" cy="23" rx="3" ry="4" fill="black"/>
    <ellipse cx="31" cy="23" rx="3" ry="4" fill="black"/>
    <path d="M18 27 Q24 31 30 27" stroke="black" stroke-width="2" fill="none" stroke-linecap="round"/>
  </svg>
  <span class="vr-badge">AI</span>
</button>

<div class="vr-pop" id="vrPop">
  <div style="font-weight:900; margin-bottom:10px;">🐱 Enable AI Voice?</div>
  <button class="btn" id="vrYes" style="padding:5px 10px; font-size:1rem; background:var(--green); color:white;">Yes</button>
  <button class="btn" id="vrNo" style="padding:5px 10px; font-size:1rem; background:var(--red); color:white;">No</button>
</div>

<div class="vr-panel" id="vrPanel">
  <div class="vr-panel-card">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid black; padding-bottom:10px;">
      <span style="font-weight:900;">Miraj's Assistant 🐱</span>
      <button id="vrClose" style="background:none; border:none; font-weight:900; cursor:pointer;">✕</button>
    </div>
    <div class="vr-log" id="vrLog"></div>
    <div class="vr-text-row">
      <input class="vr-text-in" id="vrTextInput" type="text" placeholder="Ask about BUFS, Visa, or Skills..."/>
      <button class="btn" id="vrSendText" style="padding:8px; background:var(--blue); color:white; box-shadow:2px 2px 0 black;">➤</button>
    </div>
  </div>
</div>

<script>
  // Simple scroll reveal
  const obs = new IntersectionObserver(els => els.forEach(e => e.isIntersecting && e.target.classList.add('visible')));
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>
<script src="voice-bot.js"></script>

</body>
</html>
